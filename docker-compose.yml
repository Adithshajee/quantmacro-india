version: '3.8'

services:
  quantmacro-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantmacro-platform:latest
    container_name: quantmacro-api-backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - quantmacro-net

  quantmacro-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantmacro-platform:latest
    container_name: quantmacro-ui-dashboard
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://quantmacro-api:8000
    env_file:
      - .env
    depends_on:
      - quantmacro-api
    networks:
      - quantmacro-net

networks:
  quantmacro-net:
    driver: bridge
